<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人介绍 | zhongrenjiexing</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 45%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 28px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .section {
      margin-top: 22px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #111827;
    }

    .section p,
    .section li {
      line-height: 1.7;
      color: #374151;
      margin: 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .contact a {
      text-decoration: none;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--primary);
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .contact a:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    footer {
      margin-top: 26px;
      color: #9ca3af;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="header">
      <div class="avatar">
        <img src="./20260327-144120.jpg" alt="刘凯歌头像" />
      </div>
      <div>
        <h1>刘凯歌</h1>
        <p class="subtitle">华中科技大学(HUST) & 上海创智学院(SII)联合培养博士生</p>
      </div>
    </section>

    <section class="section">
      <h2>关于我</h2>
      <p>
        你好，欢迎来到我的个人主页。我目前聚焦于具身智能与智能体相关研究，
        关注从算法到机器人系统落地的完整链路，并持续探索面向真实世界任务的可泛化控制能力。
      </p>
    </section>

    <section class="section">
      <h2>技能与方向</h2>
      <ul>
        <li>AI Agent</li>
        <li>具身智能</li>
        <li>强化学习</li>
        <li>人形 / 四足机器人运动控制</li>
      </ul>
    </section>

    <section class="section">
      <h2>联系方式</h2>
      <p>欢迎交流与合作：</p>
      <div class="contact">
        <a href="mailto:KaigeLiu@sii.edu.cn">邮箱</a>
        <a href="https://github.com/zhongrenjiexing" target="_blank" rel="noreferrer">GitHub</a>
        <a href="https://scholar.google.com/citations?user=AO7mSP4AAAAJ&hl" target="_blank" rel="noreferrer">Google Scholar</a>
      </div>
    </section>

    <footer>Last updated: 2026-03-27 | Hosted on GitHub Pages</footer>
  </main>
</body>
</html>
